<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tevafuk</title>
    
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        /* Genel Ayarlar ve Metin Seçimini Engelleme */
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            position: relative;
        }

        /* Tam Ekran Video */
        #mainVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Videonun ekranı tam kaplamasını sağlar */
            z-index: 1;
            cursor: pointer;
        }

        /* Merkezdeki Oynatma Butonu */
        #playBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            background: rgba(0, 0, 0, 0.6); 
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            color: #ffffff;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        #playBtn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: rgba(0, 0, 0, 0.8);
        }

        #playBtn span {
            font-size: 48px;
            margin-left: 4px; /* İkonun optik ortalanması */
        }

        /* Çok Küçük ve Çerçevesiz Bilgi Butonu */
        .info-btn {
            position: fixed;
            bottom: 8px; /* En sağ alt köşe */
            right: 8px;
            background: transparent;
            color: rgba(255, 255, 255, 0.4); /* Yarı saydam görünüm */
            border: none;
            cursor: pointer;
            z-index: 10;
            padding: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.2s ease;
            outline: none;
        }

        .info-btn:hover {
            color: rgba(255, 255, 255, 1);
        }

        .info-btn span {
            font-size: 20px; /* Oldukça küçük ikon */
        }

        /* Material Design 3 Dialog (Pencere) */
        dialog {
            margin: auto; 
            background-color: #1E1E20; 
            color: #E3E3E3; 
            border: none;
            border-radius: 28px; 
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 12px 6px rgba(0,0,0,0.15), 0 4px 4px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 20;
        }

        dialog[open] {
            opacity: 1;
            transform: scale(1);
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        dialog[open]::backdrop {
            opacity: 1;
        }

        .dialog-icon {
            color: #E3E3E3; 
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .dialog-title {
            margin: 0 0 16px 0;
            font-size: 1.5rem;
            font-weight: 400;
            text-align: center;
            color: #E3E3E3;
        }

        .dialog-content {
            font-size: 0.875rem;
            line-height: 1.6;
            color: #C4C7C5; 
            margin-bottom: 24px;
        }

        .dialog-content a {
            color: #E3E3E3; 
            text-decoration: underline;
            font-weight: 500;
            -webkit-user-select: auto;
            user-select: auto;
        }

        .dialog-content a:hover {
            color: #FFFFFF;
        }

        .dialog-actions {
            display: flex;
            justify-content: flex-end;
        }

        /* M3 Text Button */
        .m3-button {
            background: transparent;
            color: #E3E3E3; 
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .m3-button:hover {
            background-color: rgba(255, 255, 255, 0.08); 
        }
        
        .m3-button:active {
            background-color: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>

    <!-- Aynı Klasördeki Video Bağlantısı -->
    <video id="mainVideo" playsinline preload="auto">
        <source src="video.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <!-- Oynatma Butonu -->
    <button id="playBtn" aria-label="Oynat">
        <span class="material-symbols-outlined">play_arrow</span>
    </button>

    <!-- Köşedeki Gizli/Küçük i Butonu -->
    <button class="info-btn" id="openDialogBtn" aria-label="Bilgi">
        <span class="material-symbols-outlined">info</span>
    </button>

    <!-- Bilgi Penceresi -->
    <dialog id="infoDialog">
        <div class="dialog-icon">
            <span class="material-symbols-outlined" style="font-size: 32px;">info</span>
        </div>
        <h2 class="dialog-title">'Tevafuk' Projesi</h2>
        <div class="dialog-content">
            <p><strong>Başlangıç:</strong> 26 Kasım 2025</p><br>
            <p>Bu proje, insanları İslam'ın güzelliklerine çağırmak ve namazı hatırlatmak niyetiyle; tamamen Allah rızası gözetilerek hazırlanmıştır.</p><br>
            <p>Ayrıca detaylı bilgi ve daha fazlası için Instagram;<br>
            <a href="https://www.instagram.com/tevafuk.tr" target="_blank">https://www.instagram.com/tevafuk.tr</a></p>
        </div>
        <div class="dialog-actions">
            <button class="m3-button" id="closeDialogBtn">Kapat</button>
        </div>
    </dialog>

    <!-- İşlevsellik Script'i -->
    <script>
        const video = document.getElementById('mainVideo');
        const playBtn = document.getElementById('playBtn');
        const dialog = document.getElementById('infoDialog');
        const openBtn = document.getElementById('openDialogBtn');
        const closeBtn = document.getElementById('closeDialogBtn');

        // Ortadaki Oynatma Butonuna Basıldığında
        playBtn.addEventListener('click', () => {
            video.play();
            playBtn.style.display = 'none'; // Butonu gizle
        });

        // Videoya Tıklandığında (Durdurma İşlemi)
        video.addEventListener('click', () => {
            if (!video.paused) {
                video.pause();
                playBtn.style.display = 'flex'; // Butonu tekrar göster
            }
        });

        // Videonun sonuna gelindiğinde butonu geri getir
        video.addEventListener('ended', () => {
            playBtn.style.display = 'flex';
        });

        // i Butonuna Basıldığında (Pencereyi Aç)
        openBtn.addEventListener('click', () => {
            // Eğer video oynuyorsa bilgi ekranı açılınca durdur
            if (!video.paused) {
                video.pause();
                playBtn.style.display = 'flex';
            }
            dialog.showModal();
        });

        // Pencereyi Kapat (Buton ile)
        closeBtn.addEventListener('click', () => {
            dialog.close();
        });

        // Pencereyi Kapat (Arkaplana tıklayınca)
        dialog.addEventListener('click', (e) => {
            const dialogDimensions = dialog.getBoundingClientRect()
            if (
                e.clientX < dialogDimensions.left ||
                e.clientX > dialogDimensions.right ||
                e.clientY < dialogDimensions.top ||
                e.clientY > dialogDimensions.bottom
            ) {
                dialog.close();
            }
        });
    </script>

</body>
</html>
